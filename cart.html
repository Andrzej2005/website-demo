<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrello · TechStore</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css2?f[]=noorda@400,500,600,700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       RESET & VARIABILI
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-accent:             #0058a3;
      --clr-accent-hov:         #004080;
      --clr-bg:                 #f5f6f8; 
      --clr-surface:            #ffffff;
      --clr-text:               #1a1a2e;
      --clr-price:              #000000; 
      --clr-muted:              #6b7280;
      --clr-border:             #e2e5ea;
      
      --clr-input-bg:           #f0f2f5;
      --clr-input-focus-border: #0058a3;
      
      /* Stati Prodotto e Azioni */
      --clr-status-avail:       #16a34a; 
      --clr-status-order:       #d97706; 
      --clr-status-unavail:     #dc2626; 
      --clr-danger-light:       rgba(220, 38, 38, 0.1);

      --font:                   'Noorda', sans-serif;
      --radius:                 4px;
      --radius-sm:              4px; 
    }

    body.dark-theme {
      --clr-bg:                 #0a0a0a;
      --clr-surface:            #121212;
      --clr-text:               #ffffff;
      --clr-price:              #ffffff; 
      --clr-muted:              #a0a0a0;
      --clr-border:             #222222;
      
      --clr-input-bg:           #222222;
      --clr-input-focus-border: #555555;
      
      --clr-status-avail:       #22c55e;
      --clr-status-order:       #fbbf24;
      --clr-status-unavail:     #ef4444;
      --clr-danger-light:       rgba(239, 68, 68, 0.15);
    }

    html, body { 
      font-family: var(--font); 
      background: var(--clr-bg); 
      color: var(--clr-text); 
      transition: background-color 0.3s, color 0.3s;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════════════════════════
       LAYOUT PAGINA
    ═══════════════════════════════════════════════ */
    .page-container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
      flex-grow: 1;
    }
    
    /* Classe aggiunta dinamicamente quando il carrello è vuoto */
    .cart-layout.is-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      grid-template-columns: none;
    }

    /* ═══════════════════════════════════════════════
       LISTA PRODOTTI (SINISTRA)
    ═══════════════════════════════════════════════ */
    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cart-item {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      gap: 20px;
      position: relative; 
      transition: border-color 0.2s;
    }

    .cart-item:hover {
      border-color: var(--clr-input-focus-border);
    }

    .item-img {
      width: 130px;
      height: 130px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background-color: var(--clr-input-bg);
      flex-shrink: 0;
      cursor: pointer;
    }

    .item-details {
      display: flex;
      flex-direction: column;
      justify-content: space-between; 
      flex: 1;
      min-height: 130px; 
    }

    .item-info-top {
      padding-right: 40px; 
    }

    .item-name-link {
      display: inline-block;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--clr-text);
      line-height: 1.2;
      margin-bottom: 4px;
      text-decoration: none;
      transition: color 0.15s;
    }
    .item-name-link:hover {
      color: var(--clr-accent);
      text-decoration: underline;
    }

    .item-sku {
      font-size: 0.8rem;
      color: var(--clr-muted);
      margin-bottom: 6px;
    }

    .item-status {
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .item-status::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-disponibile { color: var(--clr-status-avail); }
    .status-disponibile::before { background-color: var(--clr-status-avail); }
    .status-ordinabile { color: var(--clr-status-order); }
    .status-ordinabile::before { background-color: var(--clr-status-order); }
    .status-non_disponibile { color: var(--clr-status-unavail); }
    .status-non_disponibile::before { background-color: var(--clr-status-unavail); }

    .item-info-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
    }

    .item-total-price {
      font-size: 1.4rem; 
      font-weight: 700;
      color: var(--clr-price); 
      line-height: 1.1;
    }

    .item-unit-price {
      font-size: 0.8rem;
      color: var(--clr-muted);
      margin-top: 2px;
    }

    /* Selettore Quantità personalizzato */
    .qty-wrapper {
      display: flex;
      align-items: center;
      background-color: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    
    .qty-wrapper:focus-within {
      border-color: var(--clr-accent);
    }

    .qty-btn {
      background: var(--clr-input-bg);
      border: none;
      color: var(--clr-text);
      width: 34px;
      height: 34px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: rgba(0,0,0,0.05); }
    body.dark-theme .qty-btn:hover { background: rgba(255,255,255,0.05); }

    .qty-native-input {
      width: 44px;
      height: 34px;
      text-align: center;
      border: none;
      background: transparent;
      color: var(--clr-text);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      -moz-appearance: textfield; 
    }
    
    .qty-native-input::-webkit-outer-spin-button,
    .qty-native-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Pulsante elimina: Icona cestino, niente movimento al passaggio */
    .btn-delete {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--clr-danger-light);
      border: none;
      color: var(--clr-status-unavail);
      border-radius: var(--radius-sm);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-delete:hover {
      background: var(--clr-status-unavail);
      color: #ffffff;
    }

    /* ═══════════════════════════════════════════════
       SCHERMATA CARRELLO VUOTO
    ═══════════════════════════════════════════════ */
    .empty-cart-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .empty-cart-icon {
      color: var(--clr-muted);
      margin-bottom: 24px;
      opacity: 0.5;
    }

    .empty-cart-container h2 { 
      color: var(--clr-text); 
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 24px; 
      letter-spacing: -0.02em;
    }

    .btn-explore {
      display: inline-block;
      padding: 14px 28px;
      background: var(--clr-accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-explore:hover { background: var(--clr-accent-hov); }
    .btn-explore:active { transform: scale(0.98); }

    /* ═══════════════════════════════════════════════
       RIEPILOGO ORDINE
    ═══════════════════════════════════════════════ */
    .cart-summary {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 24px;
      position: sticky;
      top: 24px;
    }

    .cart-summary h3 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--clr-border);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 0.95rem;
      color: var(--clr-text);
      font-weight: 500;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--clr-border);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--clr-text);
    }
    .summary-total small {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--clr-muted);
      margin-top: 4px;
    }

    .btn-submit {
      display: block; width: 100%; padding: 16px; margin-top: 24px;
      background: var(--clr-accent); border: none; border-radius: var(--radius-sm);
      color: #fff; font-family: var(--font); font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, opacity 0.2s;
    }
    .btn-submit:hover:not(:disabled)  { background: var(--clr-accent-hov); }
    .btn-submit:disabled {
      background: var(--clr-muted);
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .checkout-warning {
      color: var(--clr-status-unavail);
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 860px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-summary { position: static; }
    }
    
    @media (max-width: 560px) {
      .cart-item { 
        flex-direction: column;
        align-items: flex-start;
        padding: 16px; 
      }
      .item-img { 
        width: 100%; 
        height: 180px; 
      }
      .item-details { 
        width: 100%;
        min-height: auto; 
      }
      .item-info-top { 
        padding-right: 32px;
      }
      .item-name-link { 
        font-size: 1.05rem; 
      }
      /* Mantiene il flex row e assicura il prezzo a sinistra e il selettore a destra */
      .item-info-bottom { 
        flex-direction: row; 
        align-items: flex-end; 
        justify-content: space-between;
        margin-top: 16px;
      }
      .btn-delete { 
        top: 12px; 
        right: 12px; 
      }
    }
  </style>
</head>
<body>

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-theme');
    }
  </script>

  <div class="page-container">
    <div class="page-header" id="page-header">
      <h1>Carrello</h1>
    </div>

    <div class="cart-layout" id="main-layout">
      <div class="cart-items" id="cart-container">
        </div>

      <div class="cart-summary" id="summary-container">
        <h3>Riepilogo Ordine</h3>
        <div class="summary-row">
          <span>Subtotale</span>
          <span id="summary-subtotal">€ 0,00</span>
        </div>
        <div class="summary-row">
          <span>Spedizione</span>
          <span id="summary-shipping">€ 0,00</span>
        </div>
        <div class="summary-total">
          <span>Totale <small>IVA inclusa</small></span>
          <span id="summary-total">€ 0,00</span>
        </div>
        <button id="checkout-btn" class="btn-submit">Procedi al checkout</button>
        <div id="checkout-warning" class="checkout-warning">Rimuovi i prodotti non disponibili per proseguire.</div>
      </div>
    </div>
  </div>

  <script>
    let cart = [
      {
        id: 1,
        name: "Cuffie Wireless Noise Cancelling",
        sku: "KUD: AUD-CW-001",
        price: 149.90,
        qty: 1,
        status: "disponibile", 
        img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop"
      },
      {
        id: 2,
        name: "Tastiera Meccanica RGB",
        sku: "KUD: PER-TM-992",
        price: 89.50,
        qty: 2,
        status: "ordinabile",
        img: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=300&h=300&fit=crop"
      },
      {
        id: 3,
        name: "Monitor 4K 27\" IPS",
        sku: "KUD: DIS-4K-27",
        price: 349.00,
        qty: 1,
        status: "non_disponibile",
        img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=300&h=300&fit=crop"
      }
    ];

    const shippingCost = 5.99;
    const statusLabels = {
      disponibile: "Disponibile",
      ordinabile: "Ordinabile",
      non_disponibile: "Non disponibile"
    };

    const formatEUR = (amount) => {
      return new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(amount);
    };

    function renderCart() {
      const container = document.getElementById('cart-container');
      const layout = document.getElementById('main-layout');
      const summary = document.getElementById('summary-container');
      const header = document.getElementById('page-header');

      // Layout Carrello Vuoto Centrato
      if (cart.length === 0) {
        layout.classList.add('is-empty');
        summary.style.display = "none";
        header.style.display = "none";

        layout.innerHTML = `
          <div class="empty-cart-container">
            <svg class="empty-cart-icon" width="100" height="100" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
            </svg>
            <h2>Il tuo carrello è vuoto!</h2>
            <a href="index.html" class="btn-explore">Esplora il catalogo</a>
          </div>
        `;
        return;
      }

      container.innerHTML = '';

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        
        const cardHTML = `
          <div class="cart-item">
            <button class="btn-delete" onclick="deleteProduct(${index})" aria-label="Rimuovi prodotto dal carrello">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>

            <a href="#">
              <img src="${item.img}" alt="${item.name}" class="item-img" />
            </a>
            
            <div class="item-details">
              <div class="item-info-top">
                <a href="#" class="item-name-link">${item.name}</a>
                <div class="item-sku">${item.sku}</div>
                <div class="item-status status-${item.status}">
                  ${statusLabels[item.status]}
                </div>
              </div>
              
              <div class="item-info-bottom">
                <div class="item-price-block">
                  <div class="item-total-price">${formatEUR(itemTotal)}</div>
                  <div class="item-unit-price">${formatEUR(item.price)} cad.</div>
                </div>
                
                <div class="qty-wrapper">
                  <button class="qty-btn" onclick="updateQty(${index}, -1)" aria-label="Diminuisci quantità">-</button>
                  <input type="number" class="qty-native-input" value="${item.qty}" min="0" onchange="setQty(${index}, this.value)" aria-label="Quantità" />
                  <button class="qty-btn" onclick="updateQty(${index}, 1)" aria-label="Aumenta quantità">+</button>
                </div>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });

      updateSummary();
    }

    function updateQty(index, change) {
      const newQty = cart[index].qty + change;
      if (newQty <= 0) {
        deleteProduct(index);
      } else {
        cart[index].qty = newQty;
        renderCart();
      }
    }

    function setQty(index, value) {
      const newQty = parseInt(value, 10);
      if (isNaN(newQty) || newQty <= 0) {
        deleteProduct(index);
      } else {
        cart[index].qty = newQty;
        renderCart();
      }
    }

    function deleteProduct(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function updateSummary() {
      if (cart.length === 0) return;

      const subtotalEl = document.getElementById('summary-subtotal');
      const shippingEl = document.getElementById('summary-shipping');
      const totalEl = document.getElementById('summary-total');
      const checkoutBtn = document.getElementById('checkout-btn');
      const warningMsg = document.getElementById('checkout-warning');

      const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
      const hasUnavailable = cart.some(item => item.status === 'non_disponibile');

      subtotalEl.textContent = formatEUR(subtotal);
      shippingEl.textContent = formatEUR(shippingCost);
      totalEl.textContent = formatEUR(subtotal + shippingCost);
      
      if (hasUnavailable) {
        checkoutBtn.disabled = true;
        warningMsg.style.display = 'block';
      } else {
        checkoutBtn.disabled = false;
        warningMsg.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
