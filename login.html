<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi · TechStore</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css2?f[]=noorda@400,500,600,700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       RESET & VARIABILI
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-accent:             #0058a3;
      --clr-accent-hov:         #004080;
      --clr-bg:                 #ffffff;
      --clr-text:               #1a1a2e;
      --clr-muted:              #6b7280;
      
      /* Colori campi di input - Tema Chiaro */
      --clr-input-bg:           #f0f2f5;
      --clr-input-border:       transparent;
      --clr-input-focus-bg:     #ffffff;
      --clr-input-focus-border: #0058a3;
      --clr-placeholder:        #abb2bf;
      --calendar-icon-filter:   opacity(0.6);
      
      --font:                   'Noorda', sans-serif;
      --radius:                 8px;
    }

    body.dark-theme {
      --clr-bg:                 #121212;
      --clr-text:               #ffffff;
      --clr-muted:              #a0a0a0;
      
      /* Colori campi di input - Tema Scuro */
      --clr-input-bg:           #222222;
      --clr-input-border:       transparent;
      --clr-input-focus-bg:     #0a0a0a;
      --clr-input-focus-border: #555555;
      --clr-placeholder:        #7a8290;
      --calendar-icon-filter:   invert(1) opacity(0.6);
    }

    html, body { 
      font-family: var(--font); 
      background: var(--clr-bg); 
      color: var(--clr-text); 
      transition: background-color 0.3s, color 0.3s;
    }

    /* ═══════════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════════ */
    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .form-header { 
      margin-bottom: 32px; 
      text-align: left; 
    }
    
    .form-header h1 {
      font-size: clamp(2rem, 4vw, 2.8rem); 
      font-weight: 700;
      letter-spacing: -0.03em; 
      color: var(--clr-text);
    }

    /* ═══════════════════════════════════════════════
       FORM E INPUTS
    ═══════════════════════════════════════════════ */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .form-group-top { display: flex; justify-content: space-between; align-items: center; }

    label {
      font-size: 0.85rem; 
      font-weight: 600; 
      color: var(--clr-text);
    }
    
    .required { color: #e53935; font-size: 1em; margin-left: 2px; }

    .link-forgot {
      font-size: 0.85rem; font-weight: 600; color: var(--clr-accent);
      text-decoration: none; transition: opacity 0.15s;
    }
    .link-forgot:hover { text-decoration: underline;}

    /* Stile Input unificato */
    input[type="email"], input[type="password"] {
      width: 100%; 
      padding: 12px 14px; 
      background-color: var(--clr-input-bg);
      border: 2px solid var(--clr-input-border); 
      border-radius: var(--radius);
      color: var(--clr-text); 
      font-family: var(--font); 
      font-size: 0.95rem;
      outline: none; 
      transition: background-color 0.2s, border-color 0.2s;
    }
    input:focus {
      background-color: var(--clr-input-focus-bg);
      border-color: var(--clr-input-focus-border);
    }
    input::placeholder { color: var(--clr-placeholder); opacity: 1; }

    /* PASSWORD TOGGLE */
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap input { padding-right: 44px; }
    .toggle-pw {
      position: absolute; right: 12px; background: none; border: none; padding: 0;
      cursor: pointer; color: var(--clr-muted); display: flex; align-items: center;
      transition: color 0.15s; line-height: 0;
    }
    .toggle-pw:hover { color: var(--clr-text); }

    /* BOTTONE SUBMIT */
    .btn-submit {
      display: block; width: 100%; padding: 14px; margin-top: 16px;
      background: var(--clr-accent); border: none; border-radius: var(--radius);
      color: #fff; font-family: var(--font); font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .btn-submit:hover  { background: var(--clr-accent-hov); }
    .btn-submit:active { transform: scale(0.99); }

    .auth-footer { margin-top: 28px; text-align: left; font-size: 0.9rem; color: var(--clr-muted); }
    .auth-footer a { color: var(--clr-accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

  </style>
</head>
<body>

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-theme');
    }
  </script>

  <div class="page">
    <div class="auth-container">

      <div class="form-header">
        <h1>Accedi</h1>
      </div>

      <form action="#" method="POST">
        <div class="form-group">
          <label for="email">Email: <span class="required">*</span></label>
          <input type="email" id="email" placeholder="nome@esempio.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <div class="form-group-top">
            <label for="password">Password: <span class="required">*</span></label>
            <a href="#" class="link-forgot">Password dimenticata?</a>
          </div>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <button class="toggle-pw" type="button" aria-label="Mostra password" onclick="togglePw(this,'pw1')">
              <svg id="pw1-hide" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7 7 0 0 0 2.79-.588M5.21 3.088A7 7 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474z"/>
                <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12z"/>
              </svg>
              <svg id="pw1-show" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" style="display:none">
                <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-submit" type="submit">Accedi</button>
      </form>

      <p class="auth-footer">
        Non hai un account? <a href="register.html">Registrati ora</a>
      </p>
    </div>
  </div>

  <script>
    function togglePw(btn, id) {
      const input   = btn.closest('.input-wrap').querySelector('input');
      const visible = input.type === 'password';
      input.type = visible ? 'text' : 'password';
      document.getElementById(id + '-hide').style.display = visible ? 'none' : '';
      document.getElementById(id + '-show').style.display = visible ? ''     : 'none';
      btn.setAttribute('aria-label', visible ? 'Nascondi password' : 'Mostra password');
    }
  </script>
</body>
</html>
